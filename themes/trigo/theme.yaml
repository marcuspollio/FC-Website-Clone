# Trigo Theme for Hugo SSG metadata.


name: Trigo
license: MIT
licenselink: https://github.com/freecad/website/blob/master/LICENSE
description: A fast, simple, minimalist, responsive, and extensible Hugo theme
homepage: https://github.com/freecad/website/
features:
  - Blog
  - Taxonomies
  - Nested sections
  - Multilingual
  - Shortcodes
  - Cover image
