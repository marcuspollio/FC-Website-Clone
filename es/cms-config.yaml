singletons:

  - name: settings
    label: Site Settings
    file: config/_default/params.yaml
    icon: settings
    fields:
      - name: site_authors
        label: Default site authors
        widget: string
      - name: site_keywords
        label: Site keywords and tags
        widget: list
      - name: site_logo
        label: Site logo
        widget: image
        media_folder: /static
        public_folder: /
      - name: default_icon
        label: Default placeholder icon
        widget: image
        media_folder: /static
        public_folder: /
      - name: git_repository
        label: Git repository URL
        widget: string
      - name: socials
        label: Social media links
        widget: list
        summary: "{{label}}"
        collapsed: auto
        fields:
          - name: label
            label: Label
            widget: string
          - name: url
            label: Social media URL
            widget: string
      - name: style
        label: Theme Style
        hint: Only change the value. Please leave the key (variable name) as-is.
        widget: keyvalue
        key_label: CSS variable name
        value_label: CSS value

  - divider: true

  - name: sponsors
    label: Sponsors list
    file: data/sponsors.yaml
    icon: person_add
    fields:
      - name: sponsors
        label: Sponsors
        label_singular: Sponsor
        widget: list
        summary: "{{label}} - {{tier}}"
        thumbnail: logo
        collapsed: auto
        root: true
        fields:
          - name: id
            label: Sponsor ID
            widget: hidden
            default: "{{uuid_shorter}}"
          - name: label
            label: Label
            widget: string
