site_url: https://marcuspollio.github.io/FC-Website-Clone/

app_title: FreeCAD Admin CMS
logout_redirect_url: https://www.freecad.org
logo:
  src: https://www.freecad.org/svg/icon-freecad.svg

backend:
  name: github
  repo: freecad/website
  branch: main

media_folder: /static
public_folder: /
asset_collections:
  - name: sponsors
    label: Sponsors
    icon: person_add
    media_folder: /assets/sponsors
    public_folder: /sponsors
  - name: icons
    label: Icons
    icon: add_reaction
    media_folder: /themes/trigo/assets/svg
    public_folder: /svg
media_libraries:
  default:
    config:
      max_file_size: 1024000 # in bytes
      slugify_filename: true
      transformations:
        raster_image: # original format
          format: webp # new format, only `webp` is supported with sveltia for now
          quality: 80
          width: 1600
          height: 1600
        svg:
          optimize: true

i18n:
  structure: multiple_folders
  locales: [en, zh, es, fr, pt, de, ja]
  default_locale: en
  initial_locales: default

slug:
  encoding: ascii
  clean_accents: true
  sanitize_replacement: "-"
  trim: true
  lowercase: true

output:
  omit_empty_optional_fields: true

field_defaults:
  richtext:
    linked_images: false

collections:

  - name: homepage
    label: Homepage
    media_folder: ""
    public_folder: ""
    thumbnail: cover.image
    icon: home
    i18n: true
    files:
      - name: homepage
        label: Homepage
        file: "content/{{locale}}/_index.md"
        icon: home
        i18n: true
        fields:
          - name: title
            label: Title
            widget: string
            i18n: true
          - name: description
            label: Description
            widget: string
            i18n: true
          - name: linkTitle
            label: Link Title
            widget: string
            i18n: true
            required: false
          - name: cover
            label: Cover
            widget: object
            i18n: true
            required: false
            fields:
              - { name: image, label: Image, widget: image, i18n: duplicate, required: false }
              - { name: caption, label: Caption, widget: string, i18n: true, required: false }
          - name: body
            label: Body
            widget: richtext
            i18n: true
            required: false

  - divider: true

  - name: features-section
    label: Features
    description: Features section
    media_folder: ""
    public_folder: ""
    thumbnail: cover.image
    icon: bolt
    i18n: true
    files:
      - name: features-section-index
        label: Features
        file: content/{{locale}}/features/_index.md
        icon: bolt
        i18n: true
        fields:
          - name: title
            label: Title
            widget: string
            i18n: true
          - name: description
            label: Description
            widget: string
            i18n: true
          - name: linkTitle
            label: Link Title
            widget: string
            i18n: true
            required: false
          - name: cover
            label: Cover
            widget: object
            i18n: true
            required: false
            fields:
              - { name: image, label: Image, widget: image, i18n: duplicate, required: false }
              - { name: caption, label: Caption, widget: string, i18n: true, required: false }
          - name: body
            label: Body
            widget: richtext
            i18n: true
            required: false

  - divider: true

  - name: download-pages
    label: Download
    description: Download collection
    folder: content
    path: 'download/releases/{{slug}}/index'
    media_folder: ""
    public_folder: ""
    thumbnail: cover.image
    icon: download
    summary: "**{{title}}** {{date | date('DD MMM YYYY')}} {{draft | ternary('(draft)', '')}} · {{authors | default('no authors')}} · {{locales | upper}}"
    reorder:
      key: weight
    i18n: true

    sortable_fields:
      fields: [title, date, authors]
      default:
        field: date
        direction: descending

    view_groups:
      groups:
        - name: year
          label: Year
          field: date
          pattern: '\d{4}'
        - name: category
          label: Categories
          field: categories
      default: year

    view_filters:
      filters:
        - name: drafts
          label: Drafts
          field: draft
          pattern: true
        - name: posts_2023
